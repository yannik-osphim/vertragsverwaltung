{% extends "base.html" %}
{% block title %}{{ form_title }} - Vertragsverwaltung{% endblock %}
{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow">DATEV-Katalog</p>
    <h1>{{ form_title }}</h1>
  </div>
  <a class="button subtle" href="{{ cancel_url }}">Zurueck</a>
</section>

{% if error %}
<p class="alert">{{ error }}</p>
{% endif %}

<form class="form-grid sectioned-form" method="post" action="{{ form_action }}">
  <section class="form-section span-full">
    <h2 class="form-section-title">Stammdaten</h2>
    <div class="form-section-grid">
      <label>
        <span>Gehoert zu <span class="required-marker" title="Pflichtfeld">*</span></span>
        <select name="catalog_kind" required {% if can_change_kind is defined and not can_change_kind %}disabled{% endif %}>
          {% for key, label in catalog_kind_options.items() %}
          <option value="{{ key }}" {% if (form.catalog_kind or catalog_kind) == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
        {% if can_change_kind is defined and not can_change_kind %}
        <input type="hidden" name="catalog_kind" value="{{ form.catalog_kind or catalog_kind }}">
        <small>Wird bereits {{ usage_count }} mal genutzt; die Art kann deshalb nicht geaendert werden.</small>
        {% endif %}
      </label>
      <label>
        <span>Name <span class="required-marker" title="Pflichtfeld">*</span></span>
        <input name="name" value="{{ form.name or '' }}" required>
      </label>
      <label>
        <span>DATEV-Konto <span class="required-marker" title="Pflichtfeld">*</span></span>
        <input name="datev_account" value="{{ form.datev_account or '' }}" required>
      </label>
      <label>
        <span>Status</span>
        <select name="active">
          <option value="1" {% if form.active %}selected{% endif %}>Aktiv</option>
          <option value="0" {% if not form.active %}selected{% endif %}>Inaktiv</option>
        </select>
      </label>
      <label class="span-full">
        <span>Beschreibung</span>
        <textarea name="description" rows="4">{{ form.description or '' }}</textarea>
      </label>
    </div>
  </section>

  <div class="form-actions span-full">
    <a class="button subtle" href="{{ cancel_url }}">Abbrechen</a>
    <button class="button primary" type="submit">Speichern</button>
  </div>
</form>
{% endblock %}
